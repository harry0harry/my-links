<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Linktree pessoal e privado - HARRY@HARRY">
    <title>HARRY@HARRY - Links</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #ffffff;
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-hover-bg: rgba(255, 255, 255, 0.15);
            --btn-border: rgba(255, 255, 255, 0.2);
            --accent-color: #cc0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);

            /* Configuração da imagem base com fallback em CSS puro (Xadrez Preto e Vermelho Escuro) */
            background-image: url('assets/base.png'),
                              repeating-linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000),
                              repeating-linear-gradient(45deg, #000 25%, #300000 25%, #300000 75%, #000 75%, #000);
            background-position: center center, 0 0, 20px 20px;
            background-size: cover, 40px 40px, 40px 40px;
            background-attachment: fixed;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(0, 0, 0, 0.85);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid var(--btn-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .profile {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            background-color: #222;
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

        .username {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .bio {
            font-size: 1rem;
            color: #cccccc;
            margin-bottom: 0.8rem;
        }

        .info {
            font-size: 0.85rem;
            color: #999999;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .link-btn {
            display: block;
            width: 100%;
            padding: 1.2rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-color);
            background-color: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            background-color: var(--btn-hover-bg);
            transform: translateY(-3px);
            border-color: var(--accent-color);
            box-shadow: 0 4px 15px rgba(204, 0, 0, 0.3);
        }

        /* Estado visual para o botão 'Em Breve' */
        .link-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* =========================================
           RESPONSIVIDADE (Tablets e Celulares)
           ========================================= */

        /* Para Tablets (telas até 768px de largura) */
        @media (max-width: 768px) {
            body {
                padding: 1.5rem; /* Reduz o respiro nas laterais da tela */
            }

            .container {
                padding: 2rem 1.5rem; /* Reduz o espaçamento interno do card */
            }
        }

        /* Para Celulares (telas até 480px de largura) */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 1.5rem 1rem;
                border-radius: 15px; /* Bordas levemente menores no mobile */
            }

            .profile-img {
                width: 110px; /* Reduz um pouco a foto para ganhar espaço */
                height: 110px;
                margin-bottom: 0.8rem;
            }

            .username {
                font-size: 1.25rem; /* Ajusta o tamanho do nome */
            }

            .bio {
                font-size: 0.9rem;
            }

            .info {
                font-size: 0.8rem;
            }

            .link-btn {
                padding: 1rem; /* Botões um pouco mais compactos para facilitar o toque */
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="profile">
            <img src="assets/perfil.png" alt="Foto de perfil de HARRY@HARRY" class="profile-img">
            <h1 class="username">HARRY@HARRY</h1>
            <p class="bio">DEV por Hobby. I LOVE LINUX.</p>
            <p class="info">🎂 10/11 - 🏳️‍🌈 Gay - 🍻 Solteiro</p>
        </header>

        <main class="links">

            <a href="#" onclick="verificarSenha(event, 'https://wa.me/5565981249941')" class="link-btn">WhatsApp</a>

            <a href="https://www.instagram.com/king_harry_?igsh=aHAydG84dnc0MnV5" target="_blank" rel="noopener noreferrer" class="link-btn">IG  @KING_HARRY_</a>

            <a href="#" target="_blank" rel="noopener noreferrer" class="link-btn disabled"> - EM BREVE - </a>

            <a href="#" onclick="verificarSenha(event, 'LINK AQUI')" class="link-btn disabled"> - EM BREVE - </a>
        </main>
    </div>

    <script>
        // Função que verifica a senha
        function verificarSenha(event, linkDestino) {
            // event.preventDefault() impede que a página pule para o topo ao clicar no link (href="#")
            event.preventDefault();

            // Defina sua senha aqui
            const senhaCorreta = "134679";

            let senhaDigitada = prompt("Por favor, digite a senha para acessar o link:");

            if (senhaDigitada === senhaCorreta) {
                // Abre o link em uma nova aba (_blank) para simular o comportamento original
                window.open(linkDestino, '_blank');
            } else if (senhaDigitada !== null) {
                alert("Senha incorreta! Acesso negado.");
            }
        }

        // Script original que veio no seu código
        document.addEventListener('DOMContentLoaded', () => {
            // Confirmação de carregamento do Linktree
            console.log("Linktree pessoal - HARRY");
        });
    </script>
</body>
</html>
